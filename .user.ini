; ─────────────────────────────────────────────────────────────────────────────
; .user.ini — PHP Configuration untuk cPanel Shared Hosting
;
; File ini dibaca oleh PHP-FPM (lebih umum di cPanel modern daripada mod_php).
; Letakkan file ini di ROOT project Laravel (satu level di atas /public).
; cPanel biasanya membaca ini otomatis setiap 5 menit.
; ─────────────────────────────────────────────────────────────────────────────

; SSE stream bisa berjalan lama (maks audio 30 menit = ~30 menit proses)
max_execution_time = 0
max_input_time = -1

; Upload audio besar
upload_max_filesize = 100M
post_max_size = 100M

; Memory untuk proses audio + OpenAI response parsing
memory_limit = 512M

; KRUSIAL untuk SSE: matikan semua buffering
; Tanpa ini event SSE di-buffer dulu, baru dikirim ke browser dalam batch
output_buffering = Off
zlib.output_compression = Off
implicit_flush = On

; Hindari timeout koneksi database saat proses panjang
mysql.connect_timeout = 60
default_socket_timeout = 300
